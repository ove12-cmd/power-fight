<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 — Page Not Found · Power Fight</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="apple-touch-icon" href="favicon.png" />
<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=general-sans@400,500,600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#040505; --bg-2:#0a0b0c;
    --line:rgba(231,255,164,0.08); --line-2:rgba(255,255,255,0.06);
    --ink:#e8e8e4; --ink-dim:#8a8c86; --ink-mute:#4a4c47;
    --lime:#C7FF3F; --lime-glow:rgba(199,255,63,0.55);
    --display:"Clash Display",ui-sans-serif,system-ui,sans-serif;
    --sans:"General Sans",ui-sans-serif,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh}

  /* NAV placeholder */
  .nav-stub{
    position:fixed;top:0;left:0;right:0;z-index:100;
    padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--line-2);background:rgba(4,5,5,.92);backdrop-filter:blur(12px);
  }
  .nav-logo{
    font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:0.04em;
    text-decoration:none;color:var(--ink);
  }
  .nav-logo em{font-style:normal;color:var(--lime)}
  .nav-home{
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;
    color:var(--ink-dim);text-decoration:none;transition:color .2s;
  }
  .nav-home:hover{color:var(--lime)}

  /* Page layout */
  .page{
    min-height:100vh;display:grid;place-items:center;
    padding:120px 32px 80px;position:relative;overflow:hidden;
  }

  /* Background number */
  .bg-num{
    position:absolute;inset:0;display:grid;place-items:center;pointer-events:none;
    font-family:var(--display);font-weight:700;font-size:clamp(200px,35vw,520px);
    line-height:1;letter-spacing:-0.05em;
    color:transparent;
    -webkit-text-stroke:1px rgba(199,255,63,.06);
    user-select:none;
  }

  /* Content */
  .content{text-align:center;position:relative;z-index:1;max-width:520px}
  .eyebrow{
    display:inline-block;font-size:10px;letter-spacing:.2em;text-transform:uppercase;
    font-weight:700;color:var(--lime);margin-bottom:24px;
  }
  .heading{
    font-family:var(--display);font-weight:700;
    font-size:clamp(44px,8vw,88px);line-height:0.97;letter-spacing:-0.03em;
    margin:0 0 24px;
  }
  .heading em{font-style:normal;color:var(--lime)}
  .sub{font-size:15px;color:var(--ink-dim);line-height:1.7;margin:0 0 48px}

  /* Buttons */
  .ctas{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    font-size:13px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;
    padding:14px 28px;text-decoration:none;transition:all .2s;border-radius:2px;border:none;cursor:pointer;font-family:inherit;
  }
  .btn-primary{
    background:var(--lime);color:#040505;
    box-shadow:0 0 24px rgba(199,255,63,.25);
  }
  .btn-primary:hover{background:#d8ff5a;box-shadow:0 0 36px rgba(199,255,63,.38)}
  .btn-ghost{
    background:transparent;color:var(--ink-dim);
    border:1px solid var(--line-2);
  }
  .btn-ghost:hover{border-color:rgba(199,255,63,.35);color:var(--ink);background:rgba(199,255,63,.05)}

  /* Divider line */
  .divider{
    width:1px;height:60px;background:var(--line);margin:48px auto 0;
  }

  /* Quick links */
  .quick{display:flex;gap:32px;justify-content:center;flex-wrap:wrap;margin-top:32px}
  .quick a{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mute);text-decoration:none;transition:color .2s}
  .quick a:hover{color:var(--lime)}

  @media(max-width:600px){
    .nav-stub{padding:0 20px}
    .page{padding:100px 20px 60px}
    .ctas{flex-direction:column;align-items:center}
    .btn{width:100%;justify-content:center;max-width:280px}
  }
</style>
</head>
<body>

<nav class="nav-stub">
  <a href="/" class="nav-logo">POWER <em>FIGHT</em></a>
  <a href="/" class="nav-home">← Back to home</a>
</nav>

<main class="page">
  <div class="bg-num" aria-hidden="true">404</div>

  <div class="content">
    <span class="eyebrow">Wrong corner</span>
    <h1 class="heading">You stepped<br>out of <em>bounds.</em></h1>
    <p class="sub">The page you're looking for doesn't exist — maybe it was moved, or you took a wrong turn. Happens to the best fighters.</p>
    <div class="ctas">
      <a href="/" class="btn btn-primary">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 1L1 7l6 6M1 7h12"/></svg>
        Back to home
      </a>
      <a href="index.html#schedule" class="btn btn-ghost">View schedule</a>
    </div>
    <div class="divider"></div>
    <nav class="quick" aria-label="Quick links">
      <a href="/gallery">Gallery</a>
      <a href="/faq">FAQ</a>
      <a href="/contact">Contact</a>
      <a href="/booking">Book a session</a>
    </nav>
  </div>
</main>

</body>
</html>
